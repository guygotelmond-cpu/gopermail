server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root  /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS — forces nginx to re-resolve on every request
    # so container restarts don't leave nginx pointing at a stale IP.
    resolver 127.0.0.11 valid=10s;

    # Proxy all API calls to the apiserver — eliminates CORS and exposes only one port.
    location /api/ {
        set $upstream http://apiserver:8080;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # SSE needs buffering off and a long timeout so the persistent connection
    # is not closed by nginx before the client disconnects.
    location /api/events {
        set $upstream http://apiserver:8080;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # SPA fallback — every path serves index.html so React handles routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
